<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muslim Pro | Admin Control Center</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #0d1117; --panel: #161b22; --gold: #f3ba2f; --red: #d73a49; --green: #238636; --text: #c9d1d9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        .header { text-align: center; padding: 20px; border-bottom: 2px solid #30363d; margin-bottom: 30px; }
        .header h1 { color: var(--gold); margin: 0; font-size: 28px; }

        .user-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .user-card { background: var(--panel); border: 1px solid #30363d; border-radius: 15px; padding: 20px; transition: 0.3s; position: relative; }
        .user-card:hover { border-color: var(--gold); transform: translateY(-5px); }

        .status-tag { position: absolute; top: 15px; right: 15px; font-size: 10px; padding: 3px 8px; border-radius: 10px; font-weight: bold; text-transform: uppercase; }
        .active-tag { background: rgba(35, 134, 54, 0.2); color: #3fb950; }
        .ban-tag { background: rgba(215, 58, 73, 0.2); color: #f85149; }

        .profile-info { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .dp-circle { width: 50px; height: 50px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 25px; border: 2px solid var(--gold); }
        
        .details p { margin: 4px 0; font-size: 13px; color: #8b949e; }
        .details b { color: #fff; font-size: 16px; }

        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; border-top: 1px solid #30363d; padding-top: 15px; }
        
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 8px; border-radius: 5px; width: 100%; box-sizing: border-box; margin-bottom: 10px; text-align: center; }
        
        button { cursor: pointer; border: none; border-radius: 6px; padding: 10px; font-weight: bold; font-size: 12px; transition: 0.2s; }
        .btn-update { background: var(--green); color: white; grid-column: span 2; }
        .btn-ban { background: #30363d; color: white; }
        .btn-delete { background: var(--red); color: white; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header">
        <h1>👑 Admin Master Panel</h1>
        <p style="opacity: 0.6;">Total Users Control System</p>
    </div>

    <div class="user-grid" id="users-display">
        <!-- Users data will load here -->
    </div>

    <script>
        // FIREBASE CONFIG (Sahi API Key Applied)
        const firebaseConfig = {
            apiKey: "AIzaSyCs24nzA4eeNhnL7W0UKdwGrv0uBZPfhcY",
            authDomain: "muslim-web-59a7d.firebaseapp.com",
            databaseURL: "https://muslim-web-59a7d-default-rtdb.firebaseio.com",
            projectId: "muslim-web-59a7d",
            storageBucket: "muslim-web-59a7d.firebasestorage.app",
            messagingSenderId: "734164811000",
            appId: "1:734164811000:web:2c00c92a9c3100585ecf0d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Realtime Data Monitoring
        db.ref('users').on('value', (snapshot) => {
            const display = document.getElementById('users-display');
            display.innerHTML = '';
            
            if(!snapshot.exists()) {
                display.innerHTML = "<p style='text-align:center; width:100%;'>Abhi tak koi user nahi aaya.</p>";
                return;
            }

            snapshot.forEach((childSnapshot) => {
                const userKey = childSnapshot.key;
                const user = childSnapshot.val();
                
                const statusClass = user.isBanned ? 'ban-tag' : 'active-tag';
                const statusText = user.isBanned ? 'Banned' : 'Active';

                display.innerHTML += `
                    <div class="user-card">
                        <span class="status-tag ${statusClass}">${statusText}</span>
                        <div class="profile-info">
                            <div class="dp-circle">${user.dp || '👤'}</div>
                            <div class="details">
                                <b>${user.name || 'Unknown'}</b>
                                <p>UID: ${user.uid || 'N/A'}</p>
                                <p>Banner: ${user.banner || 'None'}</p>
                            </div>
                        </div>
                        
                        <div style="background: rgba(243,186,47,0.1); padding: 10px; border-radius: 8px; text-align: center; margin-bottom:10px;">
                            <span style="color:var(--gold); font-weight:bold;">💎 ${user.diamonds || 0}</span>
                        </div>

                        <input type="number" id="input-${userKey}" placeholder="Naye Diamonds Daalein">
                        
                        <div class="actions">
                            <button class="btn-update" onclick="updateDiamonds('${userKey}')">UPDATE DIAMONDS</button>
                            <button class="btn-ban" onclick="toggleBan('${userKey}', ${!!user.isBanned})">
                                ${user.isBanned ? '✅ UNBAN' : '🚫 BAN USER'}
                            </button>
                            <button class="btn-delete" onclick="deleteUser('${userKey}')">🗑️ DELETE</button>
                        </div>
                    </div>
                `;
            });
        });

        // --- ADMIN FUNCTIONS ---

        function updateDiamonds(key) {
            const newVal = document.getElementById('input-'+key).value;
            if(newVal === "") return alert("Pehle amount likhein!");
            
            db.ref('users/' + key).update({
                diamonds: parseInt(newVal)
            }).then(() => alert("Diamonds Update Ho Gaye!"));
        }

        function toggleBan(key, currentStatus) {
            const msg = currentStatus ? "Kya aap unban karna chahte hain?" : "Kya aap is user ko BAN karna chahte hain?";
            if(confirm(msg)) {
                db.ref('users/' + key).update({
                    isBanned: !currentStatus
                });
            }
        }

        function deleteUser(key) {
            if(confirm("⚠️ CHE चेतावनी! Kya aap sach mein is user ka poora data delete karna chahte hain? Ye wapas nahi aayega.")) {
                db.ref('users/' + key).remove();
            }
        }
    </script>
</body>
</html>
